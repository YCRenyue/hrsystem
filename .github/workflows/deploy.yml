name: 🚀 Deploy to Aliyun ECS

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: '🖥️ 部署后端服务'
        required: false
        type: boolean
        default: false
      deploy_frontend:
        description: '🌐 部署前端服务'
        required: false
        type: boolean
        default: false
      deploy_all:
        description: '🚀 部署所有服务 (优先级最高)'
        required: false
        type: boolean
        default: true
      skip_cache:
        description: '❌ 跳过构建缓存'
        required: false
        type: boolean
        default: false

env:
  # Aliyun ACR Configuration
  ACR_REGISTRY: crpi-1f9h7rkbm8zj38tu.cn-zhangjiakou.personal.cr.aliyuncs.com
  ACR_REGISTRY_VPC: crpi-1f9h7rkbm8zj38tu-vpc.cn-zhangjiakou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: ycrenyue
  ACR_REPOSITORY_BACKEND: hrsystem-backend
  ACR_REPOSITORY_FRONTEND: hrsystem-frontend
  BACKEND_PORT: 3001
  FRONTEND_PORT: 80
  DEPLOY_PLATFORM: linux/arm64
  # Database container configuration
  DB_CONTAINER_NAME: hrsystem-db
  DB_VOLUME_NAME: hrsystem-db-data
  DB_IMAGE: mysql:8.0
  DOCKER_NETWORK: hrsystem-network

jobs:
  # 1. 检测变更和配置
  prepare:
    name: 📋 准备和检测
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      should_deploy_backend: ${{ steps.deployment_logic.outputs.should_deploy_backend }}
      should_deploy_frontend: ${{ steps.deployment_logic.outputs.should_deploy_frontend }}
      use_cache: ${{ steps.deployment_logic.outputs.use_cache }}
      image_tag: ${{ steps.deployment_logic.outputs.image_tag }}
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 检测文件变更
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'backend/Dockerfile'
            frontend:
              - 'frontend/**'
              - 'frontend/Dockerfile'
            shared:
              - '**/package.json'
              - '.github/workflows/deploy.yml'

      - name: 🧠 部署逻辑决策
        id: deployment_logic
        run: |
          MANUAL_BACKEND="${{ github.event.inputs.deploy_backend }}"
          MANUAL_FRONTEND="${{ github.event.inputs.deploy_frontend }}"
          MANUAL_ALL="${{ github.event.inputs.deploy_all }}"
          SKIP_CACHE="${{ github.event.inputs.skip_cache }}"

          CHANGED_BACKEND="${{ steps.filter.outputs.backend }}"
          CHANGED_FRONTEND="${{ steps.filter.outputs.frontend }}"
          CHANGED_SHARED="${{ steps.filter.outputs.shared }}"

          # 优先级：手动部署所有 > 手动指定 > 自动检测
          if [[ "$MANUAL_ALL" == "true" ]]; then
            echo "should_deploy_backend=true" >> $GITHUB_OUTPUT
            echo "should_deploy_frontend=true" >> $GITHUB_OUTPUT
          elif [[ "$MANUAL_BACKEND" == "true" ]] || [[ "$MANUAL_FRONTEND" == "true" ]]; then
            echo "should_deploy_backend=$MANUAL_BACKEND" >> $GITHUB_OUTPUT
            echo "should_deploy_frontend=$MANUAL_FRONTEND" >> $GITHUB_OUTPUT
          else
            # 共享配置变更时同时部署前后端
            if [[ "$CHANGED_SHARED" == "true" ]]; then
              echo "should_deploy_backend=true" >> $GITHUB_OUTPUT
              echo "should_deploy_frontend=true" >> $GITHUB_OUTPUT
            else
              echo "should_deploy_backend=$CHANGED_BACKEND" >> $GITHUB_OUTPUT
              echo "should_deploy_frontend=$CHANGED_FRONTEND" >> $GITHUB_OUTPUT
            fi
          fi

          echo "use_cache=true" >> $GITHUB_OUTPUT
          if [[ "$SKIP_CACHE" == "true" ]]; then
            echo "use_cache=false" >> $GITHUB_OUTPUT
          fi

          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: 📊 环境信息展示
        run: |
          echo "🔧 部署决策结果:"
          echo "  - 部署后端: ${{ steps.deployment_logic.outputs.should_deploy_backend }}"
          echo "  - 部署前端: ${{ steps.deployment_logic.outputs.should_deploy_frontend }}"
          echo "  - 使用缓存: ${{ steps.deployment_logic.outputs.use_cache }}"
          echo "  - 镜像标签: ${{ steps.deployment_logic.outputs.image_tag }}"

  # 2. 构建和推送镜像
  build-and-push:
    name: 🏗️ 构建和推送镜像
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_deploy_backend == 'true' || needs.prepare.outputs.should_deploy_frontend == 'true' }}
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.image_info.outputs.backend_image }}
      frontend_image: ${{ steps.image_info.outputs.frontend_image }}

    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 登录 ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin \
            "${{ env.ACR_REGISTRY }}"

      # 构建和推送后端镜像
      - name: 🏗️ 构建和推送后端镜像
        if: ${{ needs.prepare.outputs.should_deploy_backend == 'true' }}
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
        run: |
          cd backend

          FULL_IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY_BACKEND }}:${IMAGE_TAG}"
          LATEST_IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY_BACKEND }}:latest"

          if [[ "${{ needs.prepare.outputs.use_cache }}" == "true" ]]; then
            docker buildx build \
              --platform ${{ env.DEPLOY_PLATFORM }} \
              --cache-from type=registry,ref=${LATEST_IMAGE} \
              --cache-to type=inline \
              --tag ${FULL_IMAGE} \
              --tag ${LATEST_IMAGE} \
              --push . || {
              echo "⚠️ Buildx 缓存构建失败，改为无缓存重试"
              docker buildx build \
                --platform ${{ env.DEPLOY_PLATFORM }} \
                --tag ${FULL_IMAGE} \
                --tag ${LATEST_IMAGE} \
                --push .
            }
          else
            docker buildx build \
              --platform ${{ env.DEPLOY_PLATFORM }} \
              --tag ${FULL_IMAGE} \
              --tag ${LATEST_IMAGE} \
              --push .
          fi

          echo "✅ Backend image pushed: ${FULL_IMAGE}"

      # 构建和推送前端镜像
      - name: 🌐 构建和推送前端镜像
        if: ${{ needs.prepare.outputs.should_deploy_frontend == 'true' }}
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          REACT_APP_API_URL: ${{ vars.BACKEND_API_URL }}
        run: |
          cd frontend

          FULL_IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY_FRONTEND }}:${IMAGE_TAG}"
          LATEST_IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY_FRONTEND }}:latest"

          if [[ "${{ needs.prepare.outputs.use_cache }}" == "true" ]]; then
            docker buildx build \
              --platform ${{ env.DEPLOY_PLATFORM }} \
              --build-arg REACT_APP_API_URL=${REACT_APP_API_URL} \
              --cache-from type=registry,ref=${LATEST_IMAGE} \
              --cache-to type=inline \
              --tag ${FULL_IMAGE} \
              --tag ${LATEST_IMAGE} \
              --push . || {
              echo "⚠️ Buildx 缓存构建失败，改为无缓存重试"
              docker buildx build \
                --platform ${{ env.DEPLOY_PLATFORM }} \
                --build-arg REACT_APP_API_URL=${REACT_APP_API_URL} \
                --tag ${FULL_IMAGE} \
                --tag ${LATEST_IMAGE} \
                --push .
            }
          else
            docker buildx build \
              --platform ${{ env.DEPLOY_PLATFORM }} \
              --build-arg REACT_APP_API_URL=${REACT_APP_API_URL} \
              --tag ${FULL_IMAGE} \
              --tag ${LATEST_IMAGE} \
              --push .
          fi

          echo "✅ Frontend image pushed: ${FULL_IMAGE}"

      - name: 📝 输出镜像信息
        id: image_info
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
        run: |
          if [[ "${{ needs.prepare.outputs.should_deploy_backend }}" == "true" ]]; then
            # Use VPC registry for ECS deployment (internal network)
            BACKEND_IMAGE="${{ env.ACR_REGISTRY_VPC }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY_BACKEND }}:${IMAGE_TAG}"
            echo "backend_image=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ needs.prepare.outputs.should_deploy_frontend }}" == "true" ]]; then
            # Use VPC registry for ECS deployment (internal network)
            FRONTEND_IMAGE="${{ env.ACR_REGISTRY_VPC }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY_FRONTEND }}:${IMAGE_TAG}"
            echo "frontend_image=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT
          fi

  # 3. 部署到 ECS (前后端 + MySQL 在同一实例，直接通过公网 IP 访问)
  deploy-to-ecs:
    name: 🚀 部署到 ECS
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    if: ${{ needs.build-and-push.result == 'success' }}

    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 配置 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      - name: SSH preflight check
        run: |
          set -euo pipefail

          ECS_HOST="${{ secrets.ECS_HOST }}"
          SSH_PORT="${{ secrets.ECS_SSH_PORT }}"

          echo "Checking TCP connectivity to ${ECS_HOST}:${SSH_PORT}"
          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/${ECS_HOST}/${SSH_PORT}"; then
            echo "::error::GitHub Actions runner cannot reach ${ECS_HOST}:${SSH_PORT}. Check that ECS is using a public IP or EIP, the security group allows the port, the OS firewall allows the port, and sshd is listening on that port."
            exit 1
          fi

          echo "Checking SSH handshake on ${ECS_HOST}:${SSH_PORT}"
          if ! ssh-keyscan -T 10 -p "${SSH_PORT}" -H "${ECS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "::error::TCP is reachable but the SSH handshake failed. This usually means the configured port is not serving sshd, sshd is unhealthy, or the server is actively resetting the runner connection."
            exit 1
          fi

      - name: 🚀 部署服务到 ECS
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          DEPLOY_BACKEND: ${{ needs.prepare.outputs.should_deploy_backend }}
          DEPLOY_FRONTEND: ${{ needs.prepare.outputs.should_deploy_frontend }}
        run: |
          ECS_HOST="${{ secrets.ECS_HOST }}"
          SSH_PORT="${{ secrets.ECS_SSH_PORT }}"

          echo "🔗 直连 ECS: ${ECS_HOST}:${SSH_PORT}"

          ssh -T \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            -p ${SSH_PORT} root@${ECS_HOST} << ENDSSH
            set -e
            set -x

            echo "📦 登录阿里云 ACR..."
            echo "Server architecture: \$(uname -m)"

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on the ECS host."
              exit 127
            fi

            if ! docker info >/dev/null 2>&1; then
              echo "Docker daemon is not running, trying to start it..."
              if command -v systemctl >/dev/null 2>&1; then
                systemctl start docker || true
                sleep 3
              fi

              if ! docker info >/dev/null 2>&1; then
                echo "Docker daemon is unavailable on the ECS host."
                exit 1
              fi
            fi

            echo "${{ secrets.ACR_PASSWORD }}" | docker login \
              --username "${{ secrets.ACR_USERNAME }}" \
              --password-stdin \
              "${{ env.ACR_REGISTRY_VPC }}"

            # 确保 docker network 存在
            docker network inspect ${{ env.DOCKER_NETWORK }} >/dev/null 2>&1 || \
              docker network create ${{ env.DOCKER_NETWORK }}

            # ============================================================
            # 数据库容器初始化（仅在容器不存在时创建）
            # ============================================================
            if ! docker ps -a --format '{{.Names}}' | grep -q "^${{ env.DB_CONTAINER_NAME }}\$"; then
              echo "🗄️ 数据库容器不存在，开始初始化..."

              docker volume inspect ${{ env.DB_VOLUME_NAME }} >/dev/null 2>&1 || \
                docker volume create ${{ env.DB_VOLUME_NAME }}

              docker pull ${{ env.DB_IMAGE }}

              docker run -d \
                --name ${{ env.DB_CONTAINER_NAME }} \
                --restart unless-stopped \
                --network ${{ env.DOCKER_NETWORK }} \
                -e MYSQL_ROOT_PASSWORD="${{ secrets.DB_ROOT_PASSWORD }}" \
                -e MYSQL_DATABASE="${{ vars.DB_NAME }}" \
                -e MYSQL_USER="${{ vars.DB_USER }}" \
                -e MYSQL_PASSWORD="${{ secrets.DB_PASSWORD }}" \
                -e TZ=Asia/Shanghai \
                -v ${{ env.DB_VOLUME_NAME }}:/var/lib/mysql \
                -p 127.0.0.1:${{ vars.DB_PORT }}:3306 \
                ${{ env.DB_IMAGE }} \
                --character-set-server=utf8mb4 \
                --collation-server=utf8mb4_unicode_ci \
                --default-time-zone=+08:00

              echo "⏳ 等待 MySQL 就绪..."
              for i in \$(seq 1 60); do
                if docker exec ${{ env.DB_CONTAINER_NAME }} \
                    mysqladmin ping -h localhost \
                    -uroot -p"${{ secrets.DB_ROOT_PASSWORD }}" --silent 2>/dev/null; then
                  echo "✅ MySQL 已就绪"
                  break
                fi
                if [ \$i -eq 60 ]; then
                  echo "❌ MySQL 启动超时"
                  docker logs ${{ env.DB_CONTAINER_NAME }} --tail 50
                  exit 1
                fi
                sleep 2
              done
            else
              echo "🗄️ 数据库容器已存在，确保运行中..."
              docker start ${{ env.DB_CONTAINER_NAME }} 2>/dev/null || true

              # 等待 MySQL 就绪以便后续 migration
              for i in \$(seq 1 30); do
                if docker exec ${{ env.DB_CONTAINER_NAME }} \
                    mysqladmin ping -h localhost \
                    -uroot -p"${{ secrets.DB_ROOT_PASSWORD }}" --silent 2>/dev/null; then
                  break
                fi
                sleep 2
              done
            fi

            # ============================================================
            # 部署后端（含 migration）
            # ============================================================
            if [[ "${DEPLOY_BACKEND}" == "true" ]]; then
              echo "🖥️ 部署后端服务..."

              docker pull ${BACKEND_IMAGE}

              # 在启动新后端容器前先跑 migration（基于新镜像里的 migration 文件）
              echo "🔧 执行数据库 migration..."
              docker run --rm \
                --network ${{ env.DOCKER_NETWORK }} \
                -e NODE_ENV=production \
                -e DB_HOST="${{ vars.DB_HOST }}" \
                -e DB_PORT="${{ vars.DB_PORT }}" \
                -e DB_NAME="${{ vars.DB_NAME }}" \
                -e DB_USER="${{ vars.DB_USER }}" \
                -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
                -e DB_TIMEZONE="${{ vars.DB_TIMEZONE }}" \
                ${BACKEND_IMAGE} \
                node src/db/migrate.js

              docker stop hrsystem-backend 2>/dev/null || true
              docker rm hrsystem-backend 2>/dev/null || true

              docker run -d \
                --name hrsystem-backend \
                --restart unless-stopped \
                --network ${{ env.DOCKER_NETWORK }} \
                -p ${{ env.BACKEND_PORT }}:3001 \
                -e NODE_ENV=production \
                -e PORT=3001 \
                -e FRONTEND_URL="${{ vars.FRONTEND_URL }}" \
                -e DB_HOST="${{ vars.DB_HOST }}" \
                -e DB_PORT="${{ vars.DB_PORT }}" \
                -e DB_NAME="${{ vars.DB_NAME }}" \
                -e DB_USER="${{ vars.DB_USER }}" \
                -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
                -e DB_TIMEZONE="${{ vars.DB_TIMEZONE }}" \
                -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                -e ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
                -e SMTP_HOST="${{ vars.SMTP_HOST }}" \
                -e SMTP_PORT="${{ vars.SMTP_PORT }}" \
                -e SMTP_SECURE="${{ vars.SMTP_SECURE }}" \
                -e SMTP_USER="${{ vars.SMTP_USER }}" \
                -e SMTP_FROM="${{ vars.SMTP_FROM }}" \
                -e SMTP_PASS="${{ secrets.SMTP_PASS }}" \
                ${BACKEND_IMAGE}

              echo "⏳ 等待后端服务启动..."
              sleep 10
              if curl -sf http://localhost:${{ env.BACKEND_PORT }}/health > /dev/null; then
                echo "✅ 后端服务部署成功"
              else
                echo "⚠️ 后端健康检查失败，查看日志："
                docker logs hrsystem-backend --tail 30
              fi
            fi

            # ============================================================
            # 部署前端
            # ============================================================
            if [[ "${DEPLOY_FRONTEND}" == "true" ]]; then
              echo "🌐 部署前端服务..."

              docker pull ${FRONTEND_IMAGE}

              docker stop hrsystem-frontend 2>/dev/null || true
              docker rm hrsystem-frontend 2>/dev/null || true

              CONTAINER_ON_PORT=\$(docker ps -q --filter "publish=${{ env.FRONTEND_PORT }}")
              if [ -n "\$CONTAINER_ON_PORT" ]; then
                echo "发现占用端口 ${{ env.FRONTEND_PORT }} 的容器，正在停止..."
                docker stop \$CONTAINER_ON_PORT 2>/dev/null || true
                docker rm \$CONTAINER_ON_PORT 2>/dev/null || true
              fi

              docker run -d \
                --name hrsystem-frontend \
                --restart unless-stopped \
                --network ${{ env.DOCKER_NETWORK }} \
                -p ${{ env.FRONTEND_PORT }}:80 \
                ${FRONTEND_IMAGE}

              echo "⏳ 等待前端服务启动..."
              sleep 5
              if curl -sf http://localhost:${{ env.FRONTEND_PORT }}/ > /dev/null; then
                echo "✅ 前端服务部署成功"
              else
                echo "⚠️ 前端健康检查失败，查看日志："
                docker logs hrsystem-frontend --tail 30
              fi
            fi

            # 清理旧镜像
            echo "🧹 清理旧镜像..."
            docker image prune -af --filter "until=24h" || true

            echo "📊 当前运行的容器："
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          ENDSSH

          if [ $? -eq 0 ]; then
            echo "🎉 部署完成"
          else
            echo "❌ 部署失败"
            exit 1
          fi

      - name: 📊 生成部署摘要
        if: always()
        run: |
          mkdir -p deployment-manifests

          cat > deployment-manifests/deployment-summary.md << EOF
          # 🚀 部署成功摘要

          **部署时间**: $(date)
          **触发方式**: ${{ github.event_name }}
          **提交哈希**: ${{ github.sha }}
          **镜像标签**: ${{ needs.prepare.outputs.image_tag }}

          ## 📋 服务部署情况

          | 服务 | 状态 | 镜像地址 |
          |------|------|----------|
          | 后端服务 | ${{ needs.prepare.outputs.should_deploy_backend == 'true' && '🟢 已部署' || '⭕ 未部署' }} | ${{ needs.build-and-push.outputs.backend_image || 'N/A' }} |
          | 前端服务 | ${{ needs.prepare.outputs.should_deploy_frontend == 'true' && '🟢 已部署' || '⭕ 未部署' }} | ${{ needs.build-and-push.outputs.frontend_image || 'N/A' }} |

          ## 🔧 环境信息

          - **ACR 注册表**: \`${{ env.ACR_REGISTRY }}\`
          - **ACR VPC 地址**: \`${{ env.ACR_REGISTRY_VPC }}\`
          - **命名空间**: \`${{ env.ACR_NAMESPACE }}\`
          - **后端端口**: \`${{ env.BACKEND_PORT }}\`
          - **前端端口**: \`${{ env.FRONTEND_PORT }}\`

          ## 🔗 数据库配置

          - **DB_HOST**: \`${{ vars.DB_HOST }}\`
          - **DB_NAME**: \`${{ vars.DB_NAME }}\`
          - **DB 容器**: \`${{ env.DB_CONTAINER_NAME }}\`

          ---
          *Generated by GitHub Actions - Run #${{ github.run_number }}*
          EOF

          cat deployment-manifests/deployment-summary.md

      - name: 📦 归档部署摘要
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary-${{ github.run_number }}
          path: deployment-manifests/
          retention-days: 30

      - name: 🎯 显示最终结果
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "🎉 部署成功完成!"
            echo "✅ 后端部署: ${{ needs.prepare.outputs.should_deploy_backend }}"
            echo "✅ 前端部署: ${{ needs.prepare.outputs.should_deploy_frontend }}"
          else
            echo "❌ 部署失败，请检查日志"
            exit 1
          fi
